services:
  costco-gas-scraper:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - nathanlai-shared

  api:
    build: .
    command: ["npx", "tsx", "src/api/server.js"]
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "3000"
      - "3001"
    networks:
      - nathanlai-shared

networks:
  nathanlai-shared:
    external: true
